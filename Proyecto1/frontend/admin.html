<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - Doctor Byte</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8">
    <h1 class="text-3xl font-bold mb-8">Administración de Base de Conocimientos</h1>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <section class="p-6 rounded-lg border shadow-lg">
            <h2 class="text-xl font-semibold mb-4">Síntomas</h2>
            <div class="flex gap-2 mb-4">
                <input type="text" id="input-sintoma" placeholder="Nuevo síntoma" class="w-full px-2 py-1 border rounded">
                <button onclick="admin.agregar('sintoma')" class="bg-indigo-600 px-3 py-1 rounded">Add</button>
            </div>
            <ul id="lista-sintomas-admin" class="space-y-2 max-h-60 overflow-y-auto pr-1"> </ul>
   
        </section>

        <section class="p-6 rounded-lg border shadow-lg">
            <h2 class="text-xl font-semibold mb-4">Fallas</h2>
            <div class="flex gap-2 mb-4">
                <input type="text" id="input-falla" placeholder="Nueva falla" class="w-full px-2 py-1 border rounded">
                <button onclick="admin.agregar('falla')" class="bg-indigo-600 px-3 py-1 rounded">Add</button>
            </div>
            <ul id="lista-fallas-admin" class="space-y-2 max-h-60 overflow-y-auto pr-1"> </ul>
        </section>

        <section class="p-6 rounded-lg border shadow-lg">
            <h2 class="text-xl font-semibold mb-4">Relaciones (Falla-Síntoma)</h2>
            <select id="select-falla" class="w-full mb-2 p-1 border rounded"></select>
            <select id="select-sintoma" class="w-full mb-2 p-1 border rounded"></select>
            <button onclick="admin.conectar()" class="w-full bg-emerald-600 py-2 rounded">Conectar</button>
        </section>

        <section class="p-6 rounded-lg border shadow-lg">
            <h2 class="text-xl font-semibold mb-4">Recomendaciones</h2>
            <div class="flex gap-2 mb-4">
                <input type="text" id="input-recomendacion" placeholder="Nueva recomendacion" class="w-full px-2 py-1 border rounded">
                <button onclick="admin.agregar('recomendacion')" class="bg-indigo-600 px-3 py-1 rounded">Add</button>
            </div>
            <ul id="lista-recomendaciones-admin" class="space-y-2 max-h-60 overflow-y-auto pr-1">
                </ul>
        </section>

        <section class="p-6 rounded-lg border shadow-lg">
            <div class="border-t border-slate-700 my-4 pt-4">
                <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-2">Relación Falla-Recomendación</h3>
                <select id="select-falla-rec" class="w-full mb-2 p-1 border rounded capitalize"></select>
                <select id="select-recomendacion" class="w-full mb-2 p-1 border rounded capitalize"></select>
                <button onclick="admin.conectarRecomendacion()" class="w-full bg-emerald-600 py-2 rounded">Conectar Falla-Rec</button>
            </div>
        </section>

    </div>
    
    <section class="p-4 rounded-lg border mb-8 shadow-md flex flex-col sm:flex-row items-center justify-between gap-4">
        <div class="flex flex-col">
            <h2 class="text-lg font-semibold">Configuración de Alertas</h2>
            <p class="text-xs text-slate-400">ID del chat o canal donde se enviarán las notificaciones de los diagnósticos.</p>
        </div>
        <div class="flex gap-2 w-full sm:w-auto">
            <input type="text" id="input-chat-id" placeholder="Ej: -5040561022" class="w-full sm:w-64 px-3 py-1.5 border rounded text-sm font-mono">
            <button onclick="admin.actualizarChatId()" class="bg-emerald-600 hover:bg-emerald-700 text-white text-sm px-4 py-1.5 rounded shadow transition font-medium whitespace-nowrap">Guardar ID</button>
        </div>
    </section>
    <script type="module" src="js/admin.js"></script>
</body>
</html>
