<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8">
    <h1 class="text-3xl font-bold mb-6">Doctor Byte: Diagnóstico</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
      
        <section class="p-6 rounded-lg border">
            <h2 class="text-xl mb-4">Selecciona los síntomas:</h2>
            <div id="lista-sintomas" class="space-y-2 h-64 overflow-y-auto"></div>
            <button id="btn-diagnosticar" class="w-full mt-4 p-3 btn-primary rounded">Diagnosticar</button>
        </section>

        <section class="p-6 rounded-lg border">
            <h2 class="text-xl mb-4">Resultado:</h2>
            <div id="resultado" class="text-lg text-indigo-300"></div>
            <ul id="recomendaciones" class="mt-4 list-disc pl-5"></ul>
        </section>

        <div class="flex items-center justify-between mt-4 p-2 bg-slate-800/40 rounded border border-slate-700/50">
            <label for="switch-notificar" class="text-sm cursor-pointer select-none">Enviar notificación de diagnóstico al Grupo de telegram configurado por medio del Bot: ia1_202106538_bot</label>
            <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                <input for="switch-notificar" type="checkbox" id="switch-notificar" class="sr-only peer">
                <div class="w-10 h-6 bg-slate-600 rounded-full peer-checked:bg-indigo-600 after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full"></div>
            </div>
        </div>
    </div>
    
    <section class="p-6 rounded-lg border mt-6">
        <h2 class="text-xl mb-4">Historial de Diagnósticos</h2>
        <div class="flex justify-between mb-2">
            <span class="text-xs text-slate-400">Últimas consultas locales</span>
            <button id="btn-limpiar-historial" class="text-xs text-rose-400 hover:underline">Limpiar historial</button>
        </div>
        <ul id="lista-historial" class="space-y-2 max-h-48 overflow-y-auto pr-1 text-sm">
            </ul>
    </section> 
    
    <script type="module" src="js/main.js"></script>
</body>
</html>
