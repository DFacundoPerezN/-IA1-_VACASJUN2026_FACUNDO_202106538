<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciudades y Rutas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="font-sans min-h-screen bg-slate-900 text-slate-50">

    <nav class="bg-slate-950 p-4 shadow-md border-b border-slate-800">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-wide text-slate-100">Gestor de Rutas Inteligente</h1>
            <span class="text-xs font-mono text-slate-400">Modo Oscuro</span>
        </div>
    </nav>

    <main class="container mx-auto my-8 p-4 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <section class="bg-slate-800 p-6 rounded-xl shadow-xl border border-slate-700">
            <h2 class="text-xl font-semibold mb-4 text-slate-100">Lista de Ciudades:</h2>
            
            <form id="form-ciudad" class="mb-6">
                <label class="block text-sm text-slate-400 mb-1">Nueva Ciudad:</label>
                <div class="flex gap-2">
                    <input type="text" id="input-ciudad" required placeholder="Ej. Hamburgo" 
                        class="bg-slate-700 text-slate-100 placeholder-slate-400 w-full px-3 py-2 border border-slate-600 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-md shadow transition">Agregar</button>
                </div>
            </form>

            <hr class="border-slate-700 mb-4">

            <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-2">Ciudades en el Sistema</h3>
            <ul id="lista-ciudades" class="divide-y divide-slate-700 max-h-64 overflow-y-auto pr-2">
                </ul>
        </section>

        <div class="md:col-span-2 flex flex-col gap-6">
            
            <section class="bg-slate-800 p-6 rounded-xl shadow-xl border border-slate-700">
                <h2 class="text-xl font-semibold mb-4 text-slate-100">Conectar Ciudades</h2>
                <form id="form-ruta" class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Origen:</label>
                        <select id="select-origen" required class="bg-slate-700 text-slate-100 w-full px-3 py-2 border border-slate-600 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 capitalize">
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Destino:</label>
                        <select id="select-destino" required class="bg-slate-700 text-slate-100 w-full px-3 py-2 border border-slate-600 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 capitalize">
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Distancia (km):</label>
                        <div class="flex gap-2">
                            <input type="number" id="input-distancia" required min="1" placeholder="150" 
                                class="bg-slate-700 text-slate-100 placeholder-slate-400 w-full px-3 py-2 border border-slate-600 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
                            <button type="submit" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-md shadow transition">Enlazar</button>
                        </div>
                    </div>
                </form>
            </section>

            <section class="bg-slate-800 p-6 rounded-xl shadow-xl border border-slate-700 flex-1">
                <h2 class="text-xl font-semibold mb-4 text-slate-100">Consultar Caminos Inteligentes</h2>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Desde:</label>
                        <select id="search-origen" class="bg-slate-700 text-slate-100 w-full px-3 py-2 border border-slate-600 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 capitalize"></select>
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Hasta:</label>
                        <select id="search-destino" class="bg-slate-700 text-slate-100 w-full px-3 py-2 border border-slate-600 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 capitalize"></select>
                    </div>
                    <div class="flex items-end gap-2">
                        <button id="btn-buscar-mejor" class="bg-indigo-600 hover:bg-indigo-700 text-white w-full py-2 rounded-md font-medium shadow transition">Mejor Ruta</button>
                        <button id="btn-buscar-todas" class="bg-slate-700 hover:bg-slate-600 text-white w-full py-2 rounded-md font-medium shadow transition">Todas</button>
                    </div>
                </div>

                <div id="contenedor-resultados" class="hidden space-y-4">
                    </div>
            </section>
        </div>

    </main>

    <script type="module" src="js/main.js"></script>
</body>
</html>
